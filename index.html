<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folk & Fair Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#F5C800;--yellow-dim:#C9A300;
  --brown:#3B1F0E;--brown-mid:#6B3A1F;
  --gray-dark:#2E2B27;--gray-mid:#8A8070;
  --gray-light:#D4CFC6;--gray-bg:#F0EDE8;
  --black:#111111;--white:#FDFAF4;--radius:12px;
  --fd:'Bebas Neue','Arial Black',Impact,sans-serif;
  --fs:'DM Serif Display',Georgia,serif;
  --fb:'Sarabun','Noto Sans Thai',Arial,sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--gray-bg);font-family:var(--fb);color:var(--black);min-height:100vh;overflow-x:hidden}

/* HEADER */
.site-header{background:var(--black);position:sticky;top:0;z-index:50;border-bottom:3px solid var(--yellow)}
.header-inner{max-width:900px;margin:0 auto;padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.logo-block{display:flex;align-items:center;gap:12px}
.beetle-icon{width:68px;flex-shrink:0}
.beetle-svg{display:block;width:100%}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-main{font-family:var(--fd);font-size:26px;color:var(--yellow);letter-spacing:2px}
.amp{color:var(--gray-mid)}
.logo-sub{font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:5px;color:var(--gray-mid);text-transform:uppercase;margin-top:2px}
.cart-btn{background:var(--yellow);border:none;border-radius:50px;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:var(--fb);font-size:14px;font-weight:500;color:var(--black);transition:background .2s,transform .15s}
.cart-btn:hover{background:var(--yellow-dim);transform:scale(1.04)}
.cart-count{background:var(--black);color:var(--yellow);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* HERO */
.hero-strip{background:var(--brown);position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:space-between;padding:2rem 1.5rem 0;min-height:220px;gap:1rem}
.hero-strip::before{content:'';position:absolute;top:-60px;left:-60px;width:280px;height:280px;background:radial-gradient(circle,rgba(245,200,0,.12) 0%,transparent 70%);pointer-events:none}
.hero-strip::after{content:'';position:absolute;bottom:0;right:0;width:40%;height:100%;background:repeating-linear-gradient(-55deg,transparent,transparent 14px,rgba(245,200,0,.04) 14px,rgba(245,200,0,.04) 15px);pointer-events:none}
.hero-content{z-index:1;flex:1;min-width:0;padding-bottom:80px}
.hero-eyebrow{font-size:11px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--yellow);margin-bottom:10px;opacity:.8}
.hero-title{font-family:var(--fd);font-size:clamp(42px,8vw,70px);line-height:.95;color:var(--white);letter-spacing:2px;margin-bottom:12px}
.hero-title em{font-family:var(--fs);font-style:italic;color:var(--yellow);font-size:.72em;display:block}
.hero-body{font-size:13px;color:var(--gray-light);line-height:1.8;font-weight:300}
.hero-beetle{flex-shrink:0;width:clamp(130px,34vw,260px);z-index:3;position:relative;align-self:flex-end;margin-bottom:0}
.hero-beetle-svg{display:block;width:100%;filter:drop-shadow(0 6px 14px rgba(0,0,0,.4))}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* TABS */
.menu-tabs{background:var(--black);display:flex;position:sticky;top:61px;z-index:40;border-bottom:2px solid var(--gray-dark);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.menu-tabs::-webkit-scrollbar{display:none}
.mtab{flex:1;padding:13px 8px;background:transparent;border:none;border-bottom:3px solid transparent;font-family:var(--fb);font-size:13px;font-weight:500;color:var(--gray-mid);cursor:pointer;transition:all .2s;white-space:nowrap;min-width:60px}
.mtab:hover{color:var(--gray-light)}
.mtab.active{color:var(--yellow);border-bottom-color:var(--yellow)}

/* MENU */
.menu-section{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.menu-card{background:var(--white);border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--gray-light);transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer;position:relative}
.menu-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.12);border-color:var(--yellow)}
.menu-card.in-cart{border-color:var(--yellow);background:#FFFBE6}
.card-top{background:var(--gray-dark);display:flex;align-items:center;justify-content:center;height:80px;font-size:38px;position:relative;overflow:hidden}
.card-top::after{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(245,200,0,.07) 1px,transparent 1px);background-size:12px 12px}
.card-body{padding:12px 12px 10px}
.card-name{font-family:var(--fd);font-size:18px;letter-spacing:1px;color:var(--brown);line-height:1.1;margin-bottom:4px}
.card-desc{font-size:11px;color:var(--gray-mid);font-weight:300;line-height:1.5;min-height:28px}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.card-price{font-family:var(--fd);font-size:20px;letter-spacing:1px;color:var(--brown-mid)}
.card-price span{font-family:var(--fb);font-size:11px;color:var(--gray-mid);font-weight:400}
.card-qty-badge{position:absolute;top:8px;right:8px;background:var(--yellow);color:var(--black);border-radius:20px;font-size:11px;font-weight:700;padding:2px 8px;z-index:2}
.add-btn{width:32px;height:32px;border-radius:50%;background:var(--black);color:var(--yellow);border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .15s;line-height:1}
.add-btn:hover{background:var(--brown);transform:scale(1.1)}
.add-btn:active{transform:scale(.95)}

/* CART DRAWER */
.cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;opacity:0;transition:opacity .3s}
.cart-overlay.open{display:block;opacity:1}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:min(420px,100vw);background:var(--white);z-index:90;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(0,0,0,.2)}
.cart-drawer.open{transform:translateX(0)}
.cart-header{background:var(--black);padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--yellow);flex-shrink:0}
.cart-title{font-family:var(--fd);font-size:28px;letter-spacing:2px;color:var(--yellow)}
.cart-close{background:none;border:1.5px solid var(--gray-mid);color:var(--gray-light);border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer;transition:border-color .2s,color .2s}
.cart-close:hover{border-color:var(--yellow);color:var(--yellow)}
.cart-body{flex:1;overflow-y:auto;padding:1.25rem 1.5rem}
.cart-empty-state{text-align:center;padding:3rem 1rem;color:var(--gray-mid)}
.cart-empty-state .bee{font-size:48px;margin-bottom:12px}
.cart-empty-state p{font-size:14px;line-height:1.7}
.cart-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-light)}
.cart-row-icon{width:44px;height:44px;background:var(--gray-dark);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.cart-row-info{flex:1}
.cart-row-name{font-size:13px;font-weight:500;color:var(--brown)}
.cart-row-price{font-size:12px;color:var(--gray-mid);margin-top:2px}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--gray-light);background:transparent;color:var(--black);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s}
.qty-btn:hover{border-color:var(--yellow);background:#FFF9D6}
.qty-num{font-size:14px;font-weight:700;min-width:18px;text-align:center;color:var(--brown)}
.cart-row-total{font-size:14px;font-weight:700;color:var(--brown-mid);min-width:52px;text-align:right;font-family:var(--fd);letter-spacing:.5px}
.notes-block{margin-top:1.25rem}
.notes-block label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gray-mid);display:block;margin-bottom:6px;font-weight:500}
.notes-block textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-light);border-radius:10px;font-family:var(--fb);font-size:13px;resize:none;background:var(--gray-bg);color:var(--black);outline:none;transition:border-color .2s}
.notes-block textarea:focus{border-color:var(--yellow)}
.cart-footer{padding:1.25rem 1.5rem;border-top:1.5px solid var(--gray-light);background:var(--white);flex-shrink:0}
.total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.total-label{font-size:13px;color:var(--gray-mid);font-weight:400}
.total-amount{font-family:var(--fd);font-size:30px;color:var(--brown);letter-spacing:1px}
.total-amount span{font-family:var(--fb);font-size:13px;color:var(--gray-mid);font-weight:400}
.order-btn{width:100%;padding:15px;background:var(--yellow);color:var(--black);border:none;border-radius:var(--radius);font-family:var(--fd);font-size:20px;letter-spacing:2px;cursor:pointer;transition:background .2s,transform .15s}
.order-btn:hover{background:var(--yellow-dim);transform:scale(1.01)}
.order-btn:disabled{background:var(--gray-light);color:var(--gray-mid);cursor:default;transform:none}

/* SUCCESS MODAL */
.success-modal{display:none;position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1.5rem}
.success-modal.show{display:flex}
.success-card{background:var(--white);border-radius:20px;padding:2rem 1.75rem;text-align:center;max-width:300px;width:100%;border-top:5px solid var(--yellow);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.success-beetle{margin-bottom:10px}
.success-card h3{font-family:var(--fd);font-size:28px;letter-spacing:2px;color:var(--brown);margin-bottom:8px}
.success-card p{font-size:13px;color:var(--gray-mid);line-height:1.8;margin-bottom:1.25rem}
.order-no{display:inline-block;background:var(--black);color:var(--yellow);padding:6px 20px;border-radius:30px;font-family:var(--fd);font-size:16px;letter-spacing:2px;margin-bottom:1.25rem}
.ok-btn{width:100%;padding:13px;background:var(--black);color:var(--yellow);border:none;border-radius:var(--radius);font-family:var(--fd);font-size:18px;letter-spacing:2px;cursor:pointer;transition:opacity .2s}
.ok-btn:hover{opacity:.85}

/* RESPONSIVE */
@media(max-width:640px){
  .hero-strip{
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:1.5rem 1.25rem 0;
    gap:0;
    min-height:auto;
    justify-content:flex-start;
  }
  .hero-content{
    padding-bottom:1rem;
    width:100%;
  }
  .hero-beetle{
    width:72vw;
    max-width:260px;
    align-self:center;
    margin-bottom:0;
  }
  .hero-title{font-size:44px}
  .menu-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:380px){
  .menu-grid{grid-template-columns:1fr}
}
</style>
</head>

let cart=[],activeTab='cold',notes='';

const App={
  init(){
    document.querySelectorAll('.mtab').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        activeTab=btn.dataset.cat;
        this.renderMenu();
      });
    });
    this.renderMenu();
    this.renderCart();
  },

  renderMenu(){
    const grid=document.getElementById('menuGrid');
    grid.innerHTML=MENU.filter(i=>i.cat===activeTab).map(item=>{
      const qty=this.getQty(item.id);
      return`<div class="menu-card${qty>0?' in-cart':''}" id="card-${item.id}">
        ${qty>0?`<div class="card-qty-badge">${qty}</div>`:''}
        <div class="card-top">${item.icon}</div>
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
          <div class="card-footer">
            <div class="card-price">฿${item.price} <span>/ แก้ว</span></div>
            <button class="add-btn" data-id="${item.id}">+</button>
          </div>
        </div>
      </div>`;
    }).join('');
    grid.querySelectorAll('.add-btn').forEach(btn=>{
      btn.addEventListener('click',e=>{e.stopPropagation();this.addItem(+btn.dataset.id);});
    });
  },

  getQty(id){const r=cart.find(c=>c.id===id);return r?r.qty:0;},

  addItem(id){
    const ex=cart.find(c=>c.id===id);
    if(ex){ex.qty++;}
    else{const m=MENU.find(i=>i.id===id);cart.push({id,name:m.name,icon:m.icon,price:m.price,qty:1});}
    this.updateBadge();this.renderMenu();
    const card=document.getElementById(`card-${id}`);
    if(card){card.style.transform='scale(1.03)';setTimeout(()=>card.style.transform='',150);}
  },

  changeQty(id,d){
    const idx=cart.findIndex(c=>c.id===id);
    if(idx===-1)return;
    cart[idx].qty+=d;
    if(cart[idx].qty<=0)cart.splice(idx,1);
    this.updateBadge();this.renderCart();this.renderMenu();
  },

  totalCount(){return cart.reduce((s,c)=>s+c.qty,0);},
  totalPrice(){return cart.reduce((s,c)=>s+c.price*c.qty,0);},

  updateBadge(){
    const el=document.getElementById('cartCount');
    el.textContent=this.totalCount();
  },

  openCart(){
    document.getElementById('cartOverlay').classList.add('open');
    document.getElementById('cartDrawer').classList.add('open');
    document.body.style.overflow='hidden';
    this.renderCart();
  },

  closeCart(){
    document.getElementById('cartOverlay').classList.remove('open');
    document.getElementById('cartDrawer').classList.remove('open');
    document.body.style.overflow='';
  },

  renderCart(){
    const body=document.getElementById('cartBody');
    const footer=document.getElementById('cartFooter');
    if(cart.length===0){
      body.innerHTML=`<div class="cart-empty-state"><div class="bee">🪲</div><p>ยังไม่มีรายการ<br/>เลือกเมนูที่ชอบได้เลยครับ</p></div>`;
      footer.innerHTML=`<div class="total-row"><span class="total-label">รวมทั้งหมด</span><span class="total-amount">฿0 <span>บาท</span></span></div><button class="order-btn" disabled>สั่ง</button>`;
      return;
    }
    body.innerHTML=cart.map(c=>`
      <div class="cart-row">
        <div class="cart-row-icon">${c.icon}</div>
        <div class="cart-row-info">
          <div class="cart-row-name">${c.name}</div>
          <div class="cart-row-price">฿${c.price} / แก้ว</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="App.changeQty(${c.id},-1)">−</button>
          <span class="qty-num">${c.qty}</span>
          <button class="qty-btn" onclick="App.changeQty(${c.id},1)">+</button>
        </div>
        <div class="cart-row-total">฿${c.price*c.qty}</div>
      </div>`).join('')
    +`<div class="notes-block"><label>หมายเหตุ</label>
      <textarea id="notesInput" rows="2" placeholder="เช่น ลดหวาน, ไม่ใส่น้ำแข็ง…">${notes}</textarea></div>
      <p style="font-size:11px;color:var(--gray-mid);margin-top:8px;text-align:center">* เมล็ดแม่จันใต้ เพิ่ม 10 บาท ทุกเมนูที่เป็นกาแฟ</p>`;
    const ni=document.getElementById('notesInput');
    if(ni)ni.addEventListener('input',()=>notes=ni.value);
    const total=this.totalPrice(),count=this.totalCount();
    footer.innerHTML=`<div class="total-row"><span class="total-label">รวม ${count} รายการ</span><span class="total-amount">฿${total} <span>บาท</span></span></div>
      <button class="order-btn" onclick="App.placeOrder()">สั่งเลย — ฿${total}</button>`;
  },

  placeOrder(){
    const ni=document.getElementById('notesInput');
    if(ni)notes=ni.value;
    const orderId='#ORD-'+Math.floor(1000+Math.random()*9000);
    document.getElementById('orderNo').textContent=orderId;
    this.closeCart();
    document.getElementById('successModal').classList.add('show');
    this.sendOrder(orderId);
  },

  sendOrder(orderId){
    // ✏️ เมื่อได้ Railway URL ให้เปลี่ยนตรงนี้
    const SERVER_URL = 'https://YOUR-APP.up.railway.app';
    const payload={
      orderId,
      timestamp: new Date().toISOString(),
      items: cart.map(c=>({id:c.id, name:c.name, qty:c.qty, price:c.price})),
      total: this.totalPrice(),
      notes: notes
    };
    fetch(`${SERVER_URL}/order`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    })
    .then(r=>r.json())
    .then(()=>console.log('✅ ส่งออเดอร์สำเร็จ'))
    .catch(()=>console.warn('⚠️ Server ไม่ได้เปิดอยู่'));
  },

  resetOrder(){
    cart=[];notes='';
    this.updateBadge();this.renderMenu();
    document.getElementById('successModal').classList.remove('show');
  }
};

document.addEventListener('keydown',e=>{if(e.key==='Escape')App.closeCart();});
document.addEventListener('DOMContentLoaded',()=>App.init());
</script>

<!-- automation.js — Road & Driving Animation (inlined) -->
<script>
(function(){
  'use strict';

  function buildRoad(){
    const hero=document.querySelector('.hero-strip');
    if(!hero)return;

    const ROAD_H = 72; // px — tall enough for wheels to sit on

    const road=document.createElement('div');
    road.id='road';
    road.style.cssText=`position:absolute;bottom:0;left:0;right:0;height:${ROAD_H}px;background:#111111;overflow:hidden;z-index:2;`;

    // White dashed center line — slow (2.5s per cycle)
    const centerLine=document.createElement('div');
    centerLine.id='centerLine';
    centerLine.style.cssText='position:absolute;top:50%;left:0;transform:translateY(-50%);height:4px;width:400%;'
      +'background:repeating-linear-gradient(90deg,#ffffff 0px,#ffffff 48px,transparent 48px,transparent 96px);'
      +'animation:roadScroll 5s linear infinite;';

    // White solid edge lines
    const topEdge=document.createElement('div');
    topEdge.style.cssText='position:absolute;top:0;left:0;right:0;height:3px;background:#ffffff;opacity:0.75;';
    const botEdge=document.createElement('div');
    botEdge.style.cssText='position:absolute;bottom:0;left:0;right:0;height:3px;background:#ffffff;opacity:0.75;';

    road.appendChild(topEdge);
    road.appendChild(centerLine);
    road.appendChild(botEdge);
    hero.appendChild(road);

    // Store road height so beetle can use it
    hero.dataset.roadH = ROAD_H;
  }

  function spinWheels(){
    const svg=document.querySelector('.hero-beetle-svg');
    if(!svg)return;
    const style=document.createElement('style');
    style.textContent=`
      @keyframes roadScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
      @keyframes wheelSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      .hero-beetle-svg .wheel-rear,.hero-beetle-svg .wheel-front{animation:wheelSpin 0.55s linear infinite}
    `;
    document.head.appendChild(style);

    const circles=svg.querySelectorAll('circle');
    const rear=[],front=[];
    circles.forEach(c=>{
      const cx=parseFloat(c.getAttribute('cx'));
      if(Math.abs(cx-72)<5) rear.push(c);
      if(Math.abs(cx-208)<5) front.push(c);
    });
    function wrap(list,cls){
      if(!list.length)return;
      const cx=parseFloat(list[0].getAttribute('cx'));
      const cy=parseFloat(list[0].getAttribute('cy'));
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.setAttribute('class',cls);
      g.setAttribute('style',`transform-origin:${cx}px ${cy}px`);
      list[0].parentNode.insertBefore(g,list[0]);
      list.forEach(c=>g.appendChild(c));
    }
    wrap(rear,'wheel-rear');
    wrap(front,'wheel-front');
  }

  function addRoadDetails(){
    const road=document.getElementById('road');
    if(!road)return;
    for(let i=0;i<10;i++){
      const dot=document.createElement('div');
      const size=2+Math.random()*3;
      dot.style.cssText=`position:absolute;width:${size}px;height:${size}px;border-radius:50%;`
        +`background:rgba(255,255,255,0.04);top:${5+Math.random()*60}px;left:${(i/10)*100}%;`
        +`animation:roadScroll ${2+Math.random()*1}s linear infinite;`;
      road.appendChild(dot);
    }
  }

  function animateBeetle(){
    const beetle=document.querySelector('.hero-beetle');
    const hero=document.querySelector('.hero-strip');
    if(!beetle||!hero)return;

    beetle.style.animation='none';
    beetle.style.position='relative';
    beetle.style.zIndex='3';

    function positionBeetle(){
      const bW=beetle.offsetWidth||240;
      const bH=bW*(140/280);
      const wheelBottomFrac=120/140;
      const bottomGapPx=bH*(1-wheelBottomFrac);
      // push beetle down so bottom of wheels = top of road (72px tall)
      beetle.style.marginBottom=(72-bottomGapPx-2)+'px';
    }

    positionBeetle();
    window.addEventListener('resize', positionBeetle);

    // Exhaust puffs
    const puffWrap=document.createElement('div');
    puffWrap.style.cssText='position:absolute;left:-14px;bottom:60px;width:40px;height:30px;pointer-events:none;overflow:visible;z-index:4;';
    beetle.appendChild(puffWrap);

    const puffs=[];
    for(let i=0;i<7;i++){
      const p=document.createElement('div');
      p.style.cssText='position:absolute;border-radius:50%;background:rgba(210,210,210,0.5);pointer-events:none;opacity:0;';
      puffWrap.appendChild(p);
      puffs.push({el:p,life:0,active:false,x:0,y:0});
    }

    let t=0,puffTimer=0,last=0;
    function frame(ts){
      const dt=Math.min((ts-last)/1000,0.05);
      last=ts; t+=dt;
      beetle.style.transform=`translateY(${Math.sin(t*10)*1.2}px)`;
      puffTimer-=dt;
      if(puffTimer<=0){
        const p=puffs.find(p=>!p.active);
        if(p){
          const sz=5+Math.random()*7;
          p.el.style.width=sz+'px'; p.el.style.height=sz+'px';
          p.active=true; p.life=0; p.x=0; p.y=0;
        }
        puffTimer=0.14+Math.random()*0.1;
      }
      puffs.forEach(p=>{
        if(!p.active)return;
        p.life+=dt; p.x-=dt*24; p.y-=dt*10;
        const op=Math.max(0,0.55-p.life*1.1);
        p.el.style.transform=`translate(${p.x}px,${p.y}px) scale(${1+p.life*1.8})`;
        p.el.style.opacity=op;
        if(op<=0)p.active=false;
      });
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function init(){
    buildRoad();
    addRoadDetails();
    spinWheels();
    // slight delay so beetle has rendered width before we measure
    setTimeout(animateBeetle, 80);
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',init);
  } else {
    init();
  }
})();
</script>
